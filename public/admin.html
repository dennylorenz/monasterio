<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Monasterio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #0d0a07;
      --dark:   #13100c;
      --gold:   #c9a84c;
      --cream:  #f5efe6;
      --muted:  #c8bfb0;
      --faint:  #5a4e3d;
      --border: rgba(201,168,76,0.2);
      --border2: rgba(201,168,76,0.08);
      --green:  #4caf7a;
      --red:    #c0392b;
    }

    body {
      background: var(--black);
      color: var(--cream);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* Header */
    .admin-header {
      background: var(--dark);
      border-bottom: 1px solid var(--border2);
      padding: 0 40px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-logo {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--cream);
    }

    .admin-badge {
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--border);
      padding: 5px 12px;
    }

    /* Main */
    .admin-main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 48px 40px;
    }

    /* Stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 48px;
    }

    .stat-card {
      background: var(--dark);
      border: 1px solid var(--border2);
      padding: 24px 28px;
    }

    .stat-label {
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 10px;
      display: block;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: var(--gold);
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .controls-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--cream);
      margin-right: auto;
    }

    .filter-btn {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 18px;
      border: 1px solid var(--border);
      color: var(--faint);
      background: none;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Lato', sans-serif;
    }

    .filter-btn:hover, .filter-btn.active {
      color: var(--gold);
      border-color: var(--gold);
      background: rgba(201,168,76,0.06);
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--faint);
      background: none;
      border: 1px solid var(--border2);
      padding: 8px 16px;
      cursor: pointer;
      font-family: 'Lato', sans-serif;
      transition: all 0.2s;
    }

    .refresh-btn:hover { color: var(--muted); border-color: var(--border); }

    /* Table */
    .table-wrapper {
      overflow-x: auto;
      border: 1px solid var(--border2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    thead {
      background: rgba(201,168,76,0.04);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 14px 20px;
      text-align: left;
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 400;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border2);
      transition: background 0.15s;
    }

    tbody tr:hover { background: rgba(201,168,76,0.02); }
    tbody tr:last-child { border-bottom: none; }

    td {
      padding: 16px 20px;
      font-size: 13px;
      color: var(--muted);
      vertical-align: middle;
    }

    td.name { color: var(--cream); font-weight: 400; }
    td.date { white-space: nowrap; font-family: monospace; font-size: 12px; }
    td.guests { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 16px; }
    td.notes { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--faint); font-size: 12px; }

    /* Status badge */
    .status-badge {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 0;
    }

    .status-badge.pending   { border: 1px solid rgba(201,168,76,0.4); color: var(--gold); }
    .status-badge.confirmed { border: 1px solid rgba(76,175,122,0.4); color: var(--green); }
    .status-badge.cancelled { border: 1px solid rgba(192,57,43,0.4); color: var(--red); }

    /* Action buttons */
    .actions { display: flex; gap: 8px; flex-wrap: nowrap; }

    .action-btn {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 12px;
      border: 1px solid;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Lato', sans-serif;
      white-space: nowrap;
      background: none;
    }

    .action-btn.confirm {
      color: var(--green);
      border-color: rgba(76,175,122,0.4);
    }
    .action-btn.confirm:hover {
      background: rgba(76,175,122,0.1);
      border-color: var(--green);
    }

    .action-btn.cancel {
      color: var(--red);
      border-color: rgba(192,57,43,0.3);
    }
    .action-btn.cancel:hover {
      background: rgba(192,57,43,0.1);
      border-color: var(--red);
    }

    .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--faint);
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-text {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--dark);
      border: 1px solid var(--border);
      color: var(--cream);
      padding: 14px 24px;
      font-size: 12px;
      letter-spacing: 1px;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      max-width: 320px;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success { border-color: rgba(76,175,122,0.5); color: var(--green); }
    .toast.error   { border-color: rgba(192,57,43,0.5); color: var(--red); }

    /* Responsive */
    @media (max-width: 768px) {
      .admin-header { padding: 0 20px; }
      .admin-main { padding: 32px 20px; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <header class="admin-header">
    <div class="admin-logo">Monasterio</div>
    <div class="admin-badge">Panel de Administración</div>
  </header>

  <main class="admin-main">

    <!-- Stats -->
    <div class="stats-bar" id="stats-bar">
      <div class="stat-card">
        <span class="stat-label">Total Reservas</span>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <span class="stat-label">Pendientes</span>
        <div class="stat-value" id="stat-pending" style="color:var(--gold)">—</div>
      </div>
      <div class="stat-card">
        <span class="stat-label">Confirmadas</span>
        <div class="stat-value" id="stat-confirmed" style="color:#4caf7a">—</div>
      </div>
      <div class="stat-card">
        <span class="stat-label">Canceladas</span>
        <div class="stat-value" id="stat-cancelled" style="color:#c0392b">—</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <h1 class="controls-title">Reservas</h1>
      <button class="filter-btn active" data-filter="all">Todas</button>
      <button class="filter-btn" data-filter="pending">Pendientes</button>
      <button class="filter-btn" data-filter="confirmed">Confirmadas</button>
      <button class="filter-btn" data-filter="cancelled">Canceladas</button>
      <button class="refresh-btn" id="refresh-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Actualizar
      </button>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
      <table id="reservations-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Personas</th>
            <th>Notas</th>
            <th>Estado</th>
            <th>Creado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr>
            <td colspan="11">
              <div class="empty-state">
                <div class="empty-icon">⏳</div>
                <div class="empty-text">Cargando...</div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>

  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <script>
    let allReservations = [];
    let currentFilter = 'all';

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      try {
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
      } catch { return dateStr; }
    }

    function formatCreated(dt) {
      if (!dt) return '—';
      try {
        const d = new Date(dt);
        return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: '2-digit' })
               + ' ' + d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      } catch { return dt; }
    }

    function statusLabel(s) {
      const labels = { pending: 'Pendiente', confirmed: 'Confirmada', cancelled: 'Cancelada' };
      return labels[s] || s;
    }

    function renderRows(data) {
      const tbody = document.getElementById('table-body');
      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="11">
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <div class="empty-text">No hay reservas</div>
          </div></td></tr>`;
        return;
      }

      tbody.innerHTML = data.map(r => `
        <tr id="row-${r.id}" data-status="${r.status}">
          <td style="color:var(--faint);font-size:11px">#${r.id}</td>
          <td class="date">${formatDate(r.date)}</td>
          <td class="date">${r.time || '—'}</td>
          <td class="name">${escHtml(r.name)}</td>
          <td><a href="mailto:${escHtml(r.email)}" style="color:var(--muted);text-decoration:underline;font-size:12px">${escHtml(r.email)}</a></td>
          <td>${r.phone ? escHtml(r.phone) : '<span style="color:var(--faint)">—</span>'}</td>
          <td class="guests">${r.guests}</td>
          <td class="notes" title="${r.notes ? escHtml(r.notes) : ''}">${r.notes ? escHtml(r.notes) : '<span style="color:var(--faint)">—</span>'}</td>
          <td><span class="status-badge ${r.status}">${statusLabel(r.status)}</span></td>
          <td class="date" style="font-size:11px">${formatCreated(r.created_at)}</td>
          <td>
            <div class="actions">
              <button class="action-btn confirm" onclick="updateStatus(${r.id},'confirmed')" ${r.status==='confirmed'?'disabled':''}>Confirmar</button>
              <button class="action-btn cancel" onclick="updateStatus(${r.id},'cancelled')" ${r.status==='cancelled'?'disabled':''}>Cancelar</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function applyFilter(filter) {
      currentFilter = filter;
      const filtered = filter === 'all'
        ? allReservations
        : allReservations.filter(r => r.status === filter);
      renderRows(filtered);
    }

    function updateStats(data) {
      document.getElementById('stat-total').textContent = data.length;
      document.getElementById('stat-pending').textContent = data.filter(r=>r.status==='pending').length;
      document.getElementById('stat-confirmed').textContent = data.filter(r=>r.status==='confirmed').length;
      document.getElementById('stat-cancelled').textContent = data.filter(r=>r.status==='cancelled').length;
    }

    async function loadReservations() {
      try {
        const res = await fetch('/api/reservations');
        if (!res.ok) throw new Error('Server error');
        allReservations = await res.json();
        updateStats(allReservations);
        applyFilter(currentFilter);
      } catch (err) {
        document.getElementById('table-body').innerHTML = `
          <tr><td colspan="11">
            <div class="empty-state">
              <div class="empty-icon">⚠️</div>
              <div class="empty-text">Error al cargar reservas</div>
            </div>
          </td></tr>`;
      }
    }

    async function updateStatus(id, status) {
      const btns = document.querySelectorAll(`#row-${id} .action-btn`);
      btns.forEach(b => b.disabled = true);

      try {
        const res = await fetch(`/api/reservations/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status }),
        });
        if (!res.ok) throw new Error();
        const updated = await res.json();

        // Update local data
        const idx = allReservations.findIndex(r => r.id === id);
        if (idx !== -1) allReservations[idx] = updated;
        updateStats(allReservations);
        applyFilter(currentFilter);

        const msgs = { confirmed: 'Reserva confirmada', cancelled: 'Reserva cancelada' };
        showToast(msgs[status] || 'Actualizado', 'success');
      } catch {
        showToast('Error al actualizar', 'error');
        btns.forEach(b => b.disabled = false);
      }
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilter(btn.dataset.filter);
      });
    });

    // Refresh
    document.getElementById('refresh-btn').addEventListener('click', loadReservations);

    // Auto-refresh every 60 seconds
    setInterval(loadReservations, 60000);

    loadReservations();
  </script>
</body>
</html>
